services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: sistema_escolar_db_prod
    environment:
      POSTGRES_DB: sistema_escolar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_escolar"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema_escolar_backend_prod
    command: ["sh", "-c", "sed -i 's/\\r$//' /app/start-prod.sh && chmod +x /app/start-prod.sh && exec sh /app/start-prod.sh"]
    env_file:
      - ./backend/.env.prod
    restart: unless-stopped
    ports:
      - "8787:8787"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./colegio-afad5-firebase-adminsdk-fbsvc-083efdca37.json:/app/colegio-afad5-firebase-adminsdk-fbsvc-083efdca37.json:ro
      - backend_media_prod:/app/media
      - backend_static_prod:/app/staticfiles

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sistema_escolar_frontend_prod
    command: ["sh", "-c", "sed -i 's/\\r$//' /app/start-prod.sh && chmod +x /app/start-prod.sh && exec sh /app/start-prod.sh"]
    env_file:
      - ./frontend/.env.production
    restart: unless-stopped
    ports:
      - "5656:5656"
    depends_on:
      - backend

volumes:
  postgres_data_prod:
  backend_media_prod:
  backend_static_prod:
