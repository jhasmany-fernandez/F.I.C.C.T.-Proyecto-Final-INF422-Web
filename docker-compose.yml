services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: sistema_escolar_db
    environment:
      POSTGRES_DB: sistema_escolar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_escolar"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema_escolar_backend
    command: ["sh", "-c", "sed -i 's/\\r$//' /app/start.sh && exec sh /app/start.sh"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./colegio-afad5-firebase-adminsdk-fbsvc-083efdca37.json:/app/colegio-afad5-firebase-adminsdk-fbsvc-083efdca37.json:ro
    ports:
      - "8787:8787"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: ["sh", "-c", "sed -i 's/\\r$//' /app/start-dev.sh && exec sh /app/start-dev.sh"]
    container_name: sistema_escolar_frontend
    env_file:
      - ./frontend/.env.local
    environment:
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "5656:5656"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
